<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>婚活自己開示QA</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<div class="container">

  <!-- 同意 -->
  <div class="consent">
    <p>
      このフォームでは回答内容を保存します。<br>
      LINE情報はハッシュ化されます。
    </p>

    <label>
      <input type="checkbox" id="consent">
      同意する
    </label>
  </div>

  <!-- Page1 -->
  <section id="page1">

    <input id="q1" type="time" placeholder="起床時間">
    <input id="q2" type="time" placeholder="就寝時間">

    <textarea id="q3" placeholder="仕事後の過ごし方"></textarea>
    <textarea id="q4" placeholder="朝の番組"></textarea>

    <input id="q5" type="text" placeholder="子どもの頃好きな番組">
    <input id="q6" type="text" placeholder="あだ名">

    <div>
      <label><input type="radio" name="q7" value="yes">ある</label>
      <label><input type="radio" name="q7" value="no">ない</label>
    </div>

    <input id="q7Detail" type="text" placeholder="MBTI詳細" style="display:none;">

    <button id="nextBtn">次へ</button>
  </section>

  <!-- Page2 -->
  <section id="page2" style="display:none;">

    <input id="q8" type="range" min="1" max="5">
    <input id="q9" type="range" min="1" max="5">

    <input id="q10" placeholder="部活">
    <input id="q11" placeholder="バイト">

    <textarea id="q12"></textarea>
    <textarea id="q13"></textarea>

    <select id="q14">
      <option>6時間以内</option>
      <option>12時間以内</option>
      <option>24時間以内</option>
      <option>3日以内</option>
      <option>相談のみ</option>
      <option>雑談しない</option>
      <option>雑談＋受信NG</option>
    </select>

    <input id="q15" placeholder="デート場所">

    <div class="buttons">
      <button id="backBtn">戻る</button>
      <button id="saveBtn">下書き</button>
      <button id="clearBtn">クリア</button>
      <button id="submitBtn">送信</button>
    </div>

  </section>

</div>

<!-- ===================== -->
<!-- 共有モーダル（重要） -->
<!-- 初期状態：絶対非表示 -->
<!-- ===================== -->
<div id="shareModal" style="display:none;" class="modal">

  <div class="modal-box">

    <h3>共有</h3>

    <input id="shareName" placeholder="共有名（空欄=匿名）">

    <button id="shareBtn">共有</button>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
