<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>婚活自己開示QA Part1</title>

<link rel="stylesheet" href="style.css"/>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<div class="container">

  <!-- Q1 -->
  <label>Q1 起床時間</label>
  <input type="time" id="q1">

  <!-- Q2 -->
  <label>Q2 就寝時間</label>
  <input type="time" id="q2">

  <!-- Q3 -->
  <label>Q3 仕事後の過ごし方</label>
  <textarea id="q3"></textarea>

  <!-- Q4 -->
  <label>Q4 朝のニュース</label>
  <textarea id="q4"></textarea>

  <!-- Q5 -->
  <label>Q5 子どもの頃好きだった番組</label>
  <input type="text" id="q5">

  <!-- Q6 -->
  <label>Q6 あだ名</label>
  <input type="text" id="q6">

  <!-- Q7 -->
  <label>Q7 MBTI経験</label>

  <label><input type="radio" name="q7" value="yes">あり</label>

  <input id="q7Detail" placeholder="MBTIタイプ（例：INTJ）">

  <label><input type="radio" name="q7" value="no">なし</label>

  <!-- Q8 -->
  <label>Q8 ポジネガ</label>
  <input type="range" id="q8" min="1" max="5">

  <!-- Q9 -->
  <label>Q9 察する力</label>
  <input type="range" id="q9" min="1" max="5">

  <!-- Q10 -->
  <label>Q10 部活</label>
  <input id="q10">

  <!-- Q11 -->
  <label>Q11 バイト</label>
  <input id="q11">

  <!-- Q12 -->
  <label>Q12 休日（人と）</label>
  <textarea id="q12"></textarea>

  <!-- Q13 -->
  <label>Q13 休日（1人）</label>
  <textarea id="q13"></textarea>

  <!-- Q14 -->
  <label>Q14 LINE頻度</label>

  <label><input type="radio" name="q14" value="6h">6時間以内</label>
  <label><input type="radio" name="q14" value="12h">12時間以内</label>
  <label><input type="radio" name="q14" value="24h">24時間以内</label>
  <label><input type="radio" name="q14" value="3d">3日以内</label>
  <label><input type="radio" name="q14" value="consult">相談のみ</label>
  <label><input type="radio" name="q14" value="nochat">雑談しない</label>

  <!-- Q15 -->
  <label>Q15 デート希望</label>
  <input id="q15">

  <button id="submitBtn">送信</button>

</div>

<!-- モーダル -->
<div id="shareModal" class="modal">
  <div class="modal-content">

    <h3>共有</h3>
    <input id="shareName" placeholder="共有名（任意）">
    <button id="shareBtn">共有する</button>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
