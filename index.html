<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>婚活QA</title>

<link rel="stylesheet" href="style.css"/>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<div class="container">

  <div class="consent-box">
    <p>回答は保存されます（LINE情報はハッシュ化）</p>

    <label>
      <input type="checkbox" id="consent">
      同意します
    </label>
  </div>

  <div id="saveStatus" class="save-status"></div>

  <div id="page1">

    <input type="time" id="q1">
    <input type="time" id="q2">
    <textarea id="q3"></textarea>
    <textarea id="q4"></textarea>
    <input id="q5">
    <input id="q6">

    <label>
      <input type="radio" name="q7" value="yes">MBTIあり
    </label>
    <label>
      <input type="radio" name="q7" value="no">MBTIなし
    </label>

    <input id="q7Detail" style="display:none">

    <button id="nextBtn">次へ</button>
    <button id="saveDraftBtn1">下書き保存</button>

  </div>

  <div id="page2" class="hidden">

    <input id="q8">
    <input id="q9">
    <input id="q10">
    <input id="q11">
    <textarea id="q12"></textarea>
    <textarea id="q13"></textarea>

    <select id="q14">
      <option value="6h">6h</option>
      <option value="12h">12h</option>
      <option value="24h">24h</option>
    </select>

    <input id="q15">

    <button id="backBtn">戻る</button>
    <button id="saveDraftBtn">下書き保存</button>
    <button id="submitBtn">送信</button>

  </div>

</div>

<!-- モーダル -->
<div id="shareModal" class="modal">
  <div class="modal-content">
    <h3>共有</h3>
    <input id="shareName">
    <button id="shareBtn">共有</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
