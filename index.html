<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>婚活自己開示QA Part1</title>

  <link rel="stylesheet" href="style.css" />

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

  <div class="container">

    <!-- 同意 -->
    <div class="consent-box">
      <p>
        このフォームでは回答内容を保存します。<br>
        LINEアカウント識別情報は保存前にハッシュ化されます。<br>
        LINE表示名やプロフィール画像は取得しません。<br>
        同じLINEアカウントから再回答した場合は上書き保存されます。
      </p>

      <label>
        <input type="checkbox" id="consent" />
        内容を確認し同意します
      </label>
    </div>

    <!-- Page 1 -->
    <div id="page1" class="page">

      <h2>Page 1</h2>

      <label>Q1 起床時間</label>
      <input type="time" id="q1" />

      <label>Q2 就寝時間</label>
      <input type="time" id="q2" />

      <label>Q3 仕事終わりの過ごし方</label>
      <textarea id="q3"></textarea>

      <label>Q4 朝のニュース・番組</label>
      <textarea id="q4"></textarea>

      <label>Q5 子どもの頃好きだったテレビ番組</label>
      <input type="text" id="q5" />

      <label>Q6 あだ名</label>
      <input type="text" id="q6" />

      <label>Q7 MBTI経験</label>

      <div>
        <label>
          <input type="radio" name="q7" value="yes" />
          やったことがある
        </label>

        <label>
          <input type="radio" name="q7" value="no" />
          やったことがない
        </label>
      </div>

      <input type="text" id="q7Detail" placeholder="MBTIタイプ" style="display:none;" />

      <button id="nextBtn">次へ</button>
    </div>

    <!-- Page 2 -->
    <div id="page2" class="page hidden">

      <h2>Page 2</h2>

      <label>Q8 ポジティブ/ネガティブ</label>
      <input type="range" id="q8" min="1" max="5" />

      <label>Q9 察する/察さない</label>
      <input type="range" id="q9" min="1" max="5" />

      <label>Q10 部活動</label>
      <input type="text" id="q10" />

      <label>Q11 バイト経験</label>
      <input type="text" id="q11" />

      <label>Q12 休日の過ごし方（人と）</label>
      <textarea id="q12"></textarea>

      <label>Q13 1人の休日</label>
      <textarea id="q13"></textarea>

      <label>Q14 LINE頻度</label>
      <select id="q14">
        <option value="6h">返信まで6時間以内</option>
        <option value="12h">返信まで12時間以内</option>
        <option value="24h">返信まで24時間以内</option>
        <option value="3d">返信まで3日以内</option>
        <option value="consult">相談のみ返信</option>
        <option value="nochat">雑談しない</option>
      </select>

      <label>Q15 デートで行きたい場所</label>
      <input type="text" id="q15" />

      <button id="backBtn">戻る</button>
      <button id="saveDraftBtn">下書き保存</button>
      <button id="clearBtn">フォームクリア</button>
      <button id="submitBtn">回答送信</button>

    </div>

  </div>

  <!-- 共有モーダル -->
  <div id="shareModal" class="modal hidden">
    <div class="modal-content">

      <h3>LINEで共有</h3>

      <input type="text" id="shareName" placeholder="共有名（空欄＝匿名）" />

      <button id="shareBtn">LINEで共有</button>
      <button id="closeModalBtn">閉じる</button>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
