<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>婚活自己開示QA Part1</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<div class="container">

  <div class="consent-box">
    <p>
      回答は保存されます。LINE情報はハッシュ化されます。
    </p>

    <label>
      <input type="checkbox" id="consent">
      同意します
    </label>
  </div>

  <!-- Page1 -->
  <div id="page1">

    <label>Q1 起床</label>
    <input type="time" id="q1">

    <label>Q2 就寝</label>
    <input type="time" id="q2">

    <label>Q3 仕事後</label>
    <textarea id="q3"></textarea>

    <label>Q4 朝のニュース</label>
    <textarea id="q4"></textarea>

    <label>Q5 子ども時代の番組</label>
    <input id="q5" type="text">

    <label>Q6 あだ名</label>
    <input id="q6" type="text">

    <label>Q7 MBTI</label>
    <label><input type="radio" name="q7" value="yes">あり</label>
    <label><input type="radio" name="q7" value="no">なし</label>

    <input id="q7Detail" placeholder="MBTIタイプ" style="display:none">

    <button id="nextBtn">次へ</button>
  </div>

  <!-- Page2 -->
  <div id="page2" class="hidden">

    <label>Q8</label>
    <input type="range" id="q8" min="1" max="5">

    <label>Q9</label>
    <input type="range" id="q9" min="1" max="5">

    <label>Q10</label>
    <input id="q10">

    <label>Q11</label>
    <input id="q11">

    <label>Q12</label>
    <textarea id="q12"></textarea>

    <label>Q13</label>
    <textarea id="q13"></textarea>

    <label>Q14</label>
    <select id="q14">
      <option value="6h">6h</option>
      <option value="12h">12h</option>
      <option value="24h">24h</option>
      <option value="3d">3d</option>
      <option value="consult">相談のみ</option>
      <option value="nochat">雑談なし</option>
    </select>

    <label>Q15</label>
    <input id="q15">

    <button id="backBtn">戻る</button>
    <button id="saveDraftBtn">下書き</button>
    <button id="clearBtn">クリア</button>
    <button id="submitBtn">送信</button>

  </div>
</div>

<!-- モーダル（初期は完全非表示） -->
<div id="shareModal" class="modal">
  <div class="modal-content">

    <h3>共有</h3>

    <input id="shareName" placeholder="共有名（任意）">

    <button id="shareBtn">共有</button>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
