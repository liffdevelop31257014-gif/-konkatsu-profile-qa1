<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>婚活自己開示QA Part1</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<div class="container">

  <!-- 同意 -->
  <div class="consent-box">
    <p>回答内容は保存されます。LINE情報はハッシュ化されます。</p>
    <label>
      <input type="checkbox" id="consent">
      同意する
    </label>
  </div>

  <!-- Page1 -->
  <div id="page1">

    <input type="time" id="q1" placeholder="Q1">
    <input type="time" id="q2" placeholder="Q2">
    <textarea id="q3"></textarea>
    <textarea id="q4"></textarea>
    <input type="text" id="q5">
    <input type="text" id="q6">

    <div>
      <label><input type="radio" name="q7" value="yes">ある</label>
      <label><input type="radio" name="q7" value="no">ない</label>
    </div>

    <input type="text" id="q7Detail" style="display:none;">

    <button id="nextBtn">次へ</button>
  </div>

  <!-- Page2 -->
  <div id="page2" class="hidden">

    <input type="range" id="q8" min="1" max="5">
    <input type="range" id="q9" min="1" max="5">

    <input id="q10">
    <input id="q11">
    <textarea id="q12"></textarea>
    <textarea id="q13"></textarea>

    <select id="q14">
      <option>6時間以内</option>
      <option>12時間以内</option>
      <option>24時間以内</option>
      <option>3日以内</option>
      <option>相談のみ</option>
      <option>雑談しない</option>
      <option>雑談＋受信NG</option>
    </select>

    <input id="q15">

    <button id="backBtn">戻る</button>
    <button id="saveDraftBtn">下書き</button>
    <button id="clearBtn">クリア</button>
    <button id="submitBtn">送信</button>
  </div>

</div>

<!-- ★共有モーダル（初期非表示保証） -->
<div id="shareModal" class="modal">
  <div class="modal-box">

    <h3>共有</h3>

    <input id="shareName" placeholder="共有名（空欄=匿名）">

    <button id="shareBtn">共有</button>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
